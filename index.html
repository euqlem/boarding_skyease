<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyEase Boarding Pass</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --yellow:      #FFD000;
      --yellow-dark: #E6B800;
      --blue:        #1565C0;
      --blue-light:  #1E90FF;
      --white:       #FFFFFF;
      --bg:          #F0F4F8;
      --card:        #FFFFFF;
      --card-body:   #F7F9FC;
      --border:      #DDE5EF;
      --muted:       #7A93AE;
      --text:        #1A2A3A;
      --confirmed:   #1B9E4B;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px;
      background-image:
        radial-gradient(ellipse at 20% 0%,  rgba(255,208,0,0.15)  0%, transparent 55%),
        radial-gradient(ellipse at 80% 100%, rgba(21,101,192,0.08) 0%, transparent 55%);
    }

    /* ── PAGE HEADER ── */
    .page-header { text-align: center; margin-bottom: 36px; animation: fadeDown 0.6s ease both; }
    .page-header .logo { font-size: 28px; font-weight: 900; color: var(--blue); letter-spacing: -0.5px; }
    .page-header .logo span { color: var(--yellow-dark); }
    .page-header .subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; letter-spacing: 2px; text-transform: uppercase; }

    /* ── CARD ── */
    .boarding-pass {
      width: 100%; max-width: 600px;
      background: var(--card);
      border-radius: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 12px 48px rgba(21,101,192,0.12), 0 2px 8px rgba(0,0,0,0.06);
      animation: fadeUp 0.7s ease 0.1s both;
    }

    /* ── YELLOW HEADER ── */
    .pass-header {
      background: linear-gradient(135deg, var(--yellow) 0%, #FFC200 100%);
      padding: 28px 32px 24px;
      position: relative; overflow: hidden;
    }
    .pass-header::before {
      content: '✈'; position: absolute; right: -10px; top: 50%;
      transform: translateY(-50%) rotate(0deg);
      font-size: 120px; opacity: 0.10; line-height: 1; color: #fff;
      pointer-events: none;
    }
    .pass-header .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.35); border: 1.5px solid rgba(27,158,75,0.6);
      color: #116330; font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; padding: 4px 14px; border-radius: 20px; margin-bottom: 16px;
    }
    .pass-header .booking-num {
      font-family: 'Share Tech Mono', monospace; font-size: 22px;
      color: var(--blue); letter-spacing: 2px; margin-bottom: 4px;
    }
    .pass-header .pass-label {
      font-size: 12px; color: rgba(21,101,192,0.7); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600;
    }

    /* ── ROUTE ── */
    .route-section {
      padding: 28px 32px; display: flex; align-items: center; gap: 16px;
      border-bottom: 1.5px dashed var(--border); background: var(--card);
    }
    .route-city { flex: 1; text-align: center; }
    .route-city .city-code { font-size: 44px; font-weight: 900; color: var(--blue); line-height: 1; letter-spacing: -1px; }
    .route-city .city-name { font-size: 12px; color: var(--muted); margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .route-city .city-airport { font-size: 10px; color: #AABCCE; margin-top: 3px; }
    .route-arrow { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .route-arrow .arrow-line { display: flex; align-items: center; }
    .route-arrow .arrow-line .line { width: 70px; height: 2px; background: linear-gradient(90deg, #dde5ef, var(--blue-light)); }
    .route-arrow .arrow-line .head { width:0; height:0; border-top:6px solid transparent; border-bottom:6px solid transparent; border-left:10px solid var(--blue-light); }
    .route-arrow .flight-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

    /* ── DETAILS ── */
    .details-section {
      padding: 24px 32px; display: grid; grid-template-columns: repeat(3,1fr);
      gap: 20px; border-bottom: 1.5px dashed var(--border); background: var(--card-body);
    }
    .detail-item .di-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 4px; font-weight: 600; }
    .detail-item .di-value { font-size: 15px; font-weight: 700; color: var(--text); }
    .detail-item .di-value.highlight { color: var(--blue-light); }

    /* ── PASSENGERS ── */
    .passenger-section { padding: 24px 32px; border-bottom: 1.5px dashed var(--border); background: var(--card); }
    .section-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; font-weight: 700; }

    .passenger-card {
      padding: 14px 16px;
      background: #F0F6FF;
      border: 1px solid #D0E3FA;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .passenger-card:last-child { margin-bottom: 0; }
    .passenger-num { font-size: 10px; color: var(--blue-light); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
    .passenger-name { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
    .passenger-meta { display: flex; gap: 20px; flex-wrap: wrap; }
    .pmeta-item { display: flex; flex-direction: column; gap: 2px; }
    .pmeta-item .pm-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .pmeta-item .pm-value { font-size: 13px; color: var(--text); font-weight: 600; }

    /* ── BAGGAGE ── */
    .baggage-section { padding: 20px 32px; border-bottom: 1.5px dashed var(--border); background: var(--card-body); }
    .baggage-grid { display: flex; flex-direction: column; gap: 14px; }
    .baggage-pax-block { }
    .baggage-pax-label { font-size: 10px; color: var(--blue-light); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .baggage-row { display: flex; gap: 10px; }
    .baggage-item {
      flex: 1; background: #FFF9E0; border: 1px solid #FFDE66;
      border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 10px;
    }
    .baggage-icon { font-size: 22px; }
    .baggage-info .bi-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .baggage-info .bi-value { font-size: 13px; font-weight: 700; color: var(--text); }

    /* ── TEAR LINE ── */
    .tear-line { display: flex; align-items: center; padding: 0 20px; background: var(--card); }
    .tear-line::before, .tear-line::after {
      content: ''; width: 24px; height: 24px; background: var(--bg);
      border-radius: 50%; flex-shrink: 0; border: 1px solid var(--border);
    }
    .tear-dots { flex: 1; border-top: 2px dashed var(--border); margin: 0 4px; }

    /* ── QR SECTION ── */
    .qr-section { padding: 28px 32px; display: flex; align-items: center; gap: 28px; background: var(--card); }
    .qr-box {
      flex: 0 0 auto; background: white; border-radius: 12px; padding: 12px;
      width: 130px; height: 130px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(21,101,192,0.15); border: 1px solid var(--border);
    }
    .qr-box img, .qr-box canvas { width: 106px !important; height: 106px !important; }
    .qr-info { flex: 1; }
    .qr-info .qi-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .qr-info .qi-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .qr-info .qi-scan { margin-top: 10px; font-size: 11px; color: var(--confirmed); font-weight: 700; letter-spacing: 0.5px; }

    /* ── FOOTER ── */
    .pass-footer {
      background: #FFFBE6; border-top: 1px solid #FFE580;
      padding: 20px 32px; display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    .pass-footer .reminder { font-size: 11px; color: var(--muted); line-height: 1.8; }
    .pass-footer .reminder strong { color: #B07D00; }
    .print-btn {
      background: var(--blue); color: white; border: none;
      padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: 'Barlow', sans-serif; transition: background 0.2s;
    }
    .print-btn:hover { background: #0D47A1; }

    /* ── STATES ── */
    .error-state { text-align: center; padding: 60px 32px; color: var(--muted); }
    .error-state .err-icon { font-size: 48px; margin-bottom: 16px; }
    .error-state h2 { color: var(--text); margin-bottom: 8px; }
    .loading-state { text-align: center; padding: 60px 32px; color: var(--muted); }
    .loading-state .spinner {
      width: 40px; height: 40px; border: 3px solid #DDE5EF;
      border-top-color: var(--blue); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }

    @keyframes spin      { to { transform: rotate(360deg); } }
    @keyframes fadeDown  { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp    { from { opacity:0; transform:translateY(30px);  } to { opacity:1; transform:translateY(0); } }

    @media (max-width: 500px) {
      .details-section { grid-template-columns: repeat(2,1fr); }
      .route-city .city-code { font-size: 32px; }
      .route-arrow .arrow-line .line { width: 40px; }
      .qr-section { flex-direction: column; text-align: center; }
      .baggage-row { flex-direction: column; }
      .pass-header,.route-section,.details-section,.passenger-section,
      .baggage-section,.qr-section,.pass-footer { padding-left:20px; padding-right:20px; }
    }
    @media print {
      body { background: white; padding: 0; }
      .boarding-pass { box-shadow: none; }
      .print-btn { display: none; }
    }
  </style>
</head>

function resolveAirport(input) {
  const key = (input||'').toLowerCase().trim();
  if (AIRPORTS[key]) return AIRPORTS[key];
  for (const [k,v] of Object.entries(AIRPORTS)) {
    if (key.includes(k) || k.includes(key)) return v;
  }
  const code = key.substring(0,3).toUpperCase();
  const display = input.charAt(0).toUpperCase()+input.slice(1);
  return { code, name:display, airport:display+" Airport", terminal:"" };
}

function getParams() {
  const p = new URLSearchParams(window.location.search);
  const r = {};
  for (const [k,v] of p.entries()) r[k]=v;
  return r;
}

function parsePassengers(p) {
  const list = [];
  for (let i=1; i<=20; i++) {
    const suf = i===1?'':String(i);
    const name = p['name'+suf];
    if (!name && i>1) break;
    if (!name) continue;
    list.push({ name, gender:p['gender'+suf]||'N/A', dob:p['dob'+suf]||'N/A', meal:p['meal'+suf]||'Standard', seat:p['seat'+suf]||'N/A' });
  }
  if (list.length===0 && p.names) {
    p.names.split(',').forEach((n,i)=>{
      list.push({ name:n.trim(), gender:(p.genders||'').split(',')[i]?.trim()||'N/A', dob:(p.dobs||'').split(',')[i]?.trim()||'N/A', meal:(p.meals||'').split(',')[i]?.trim()||'Standard', seat:(p.seats||'').split(',')[i]?.trim()||'N/A' });
    });
  }
  if (list.length===0) {
    const pax = parseInt(p.pax||p.passengers||1);
    for (let j=0;j<pax;j++) list.push({ name:'Passenger '+(j+1), gender:'N/A', dob:'N/A', meal:'Standard', seat:'N/A' });
  }
  return list;
}

function getBaggage(cls) {
  const m = { economy:{cabin:'7 kg',checked:'20 kg'}, business:{cabin:'10 kg',checked:'30 kg'}, first:{cabin:'15 kg',checked:'40 kg'} };
  return m[(cls||'economy').toLowerCase()]||m.economy;
}
function cap(s){ return s?s.charAt(0).toUpperCase()+s.slice(1).toLowerCase():''; }

// ── LOAD ──────────────────────────────────────────────────────────────────────
function loadBoardingPass() {
  const p = getParams();
  if (!p.from && !p.booking) {
    renderPass({
      booking:'Z2 773', fromInfo:resolveAirport('manila'), toInfo:resolveAirport('cebu'),
      date:'Tue, May 26 2026', time:'22:05', arrival:'23:30', cls:'economy', airline:'AirAsia',
      passengers:[
        { name:'Noel Tagra',           gender:'Male', dob:'N/A', meal:'Standard', seat:'N/A' },
        { name:'Albert Condrar Tagra', gender:'Male', dob:'N/A', meal:'Standard', seat:'N/A' },
      ],
      baggagePerPax:{ cabin:'7 kg', checked:null },
    });
    return;
  }
  if (p.from) {
    const cls = (p.class||'economy').toLowerCase();
    renderPass({
      booking:p.booking||'SKY-BOARDING',
      fromInfo:resolveAirport(p.from), toInfo:resolveAirport(p.to||''),
      date:p.date||'N/A', time:p.time||'N/A', arrival:p.arrival||'N/A',
      cls, airline:p.airline||'SkyEase',
      passengers:parsePassengers(p), baggagePerPax:getBaggage(cls),
    });
  } else { fetchFromBackend(p.booking); }
}

function renderPass({ booking, fromInfo, toInfo, date, time, arrival, cls, airline, passengers, baggagePerPax }) {
  const fT = fromInfo.terminal?' · '+fromInfo.terminal:'';
  const tT = toInfo.terminal  ?' · '+toInfo.terminal  :'';

  const passengerCards = passengers.map((pax,i)=>`
    <div class="passenger-card">
      <div class="passenger-num">Passenger ${i+1}</div>
      <div class="passenger-name">${pax.name}</div>
      <div class="passenger-meta">
        <div class="pmeta-item"><span class="pm-label">Gender</span><span class="pm-value">${cap(pax.gender)}</span></div>
        <div class="pmeta-item"><span class="pm-label">Date of Birth</span><span class="pm-value">${pax.dob}</span></div>
        <div class="pmeta-item"><span class="pm-label">Meal</span><span class="pm-value">${cap(pax.meal)||'Standard'}</span></div>
        ${pax.seat!=='N/A'?`<div class="pmeta-item"><span class="pm-label">Seat</span><span class="pm-value" style="color:var(--blue-light)">${pax.seat}</span></div>`:''}
      </div>
    </div>`).join('');

  const baggageBlocks = passengers.map(pax=>`
    <div class="baggage-pax-block">
      <div class="baggage-pax-label">${pax.name}</div>
      <div class="baggage-row">
        <div class="baggage-item">
          <div class="baggage-icon">🎒</div>
          <div class="baggage-info">
            <div class="bi-label">Cabin Baggage</div>
            <div class="bi-value">${baggagePerPax.cabin} (Included)</div>
          </div>
        </div>
        ${baggagePerPax.checked?`
        <div class="baggage-item">
          <div class="baggage-icon">🧳</div>
          <div class="baggage-info">
            <div class="bi-label">Checked Baggage</div>
            <div class="bi-value">${baggagePerPax.checked}</div>
          </div>
        </div>`:''}
      </div>
    </div>`).join('');

  const paxNames = passengers.map(p=>p.name).join(', ');

  document.getElementById('boardingPass').innerHTML = `
    <div class="pass-header">
      <div class="status-badge">✅ CONFIRMED</div>
      <div class="booking-num">${booking}</div>
      <div class="pass-label">Booking Reference</div>
    </div>

    <div class="route-section">
      <div class="route-city">
        <div class="city-code">${fromInfo.code}</div>
        <div class="city-name">${fromInfo.name}</div>
        <div class="city-airport">${fromInfo.airport}${fT}</div>
      </div>
      <div class="route-arrow">
        <div class="arrow-line"><div class="line"></div><div class="head"></div></div>
        <div class="flight-label">${airline}</div>
      </div>
      <div class="route-city">
        <div class="city-code">${toInfo.code}</div>
        <div class="city-name">${toInfo.name}</div>
        <div class="city-airport">${toInfo.airport}${tT}</div>
      </div>
    </div>

    <div class="details-section">
      <div class="detail-item"><div class="di-label">Date</div><div class="di-value">${date}</div></div>
      <div class="detail-item"><div class="di-label">Departure</div><div class="di-value highlight">${time}</div></div>
      <div class="detail-item"><div class="di-label">Class</div><div class="di-value">${cls.toUpperCase()}</div></div>
      <div class="detail-item"><div class="di-label">Arrival</div><div class="di-value highlight">${arrival}</div></div>
      <div class="detail-item"><div class="di-label">Airline</div><div class="di-value">${airline}</div></div>
      <div class="detail-item"><div class="di-label">Passengers</div><div class="di-value">${passengers.length} pax</div></div>
    </div>

    <div class="passenger-section">
      <div class="section-title">Passenger Information</div>
      ${passengerCards}
    </div>

    <div class="baggage-section">
      <div class="section-title">Baggage Allowance</div>
      <div class="baggage-grid">${baggageBlocks}</div>
    </div>

    <div class="tear-line"><div class="tear-dots"></div></div>

    <div class="qr-section">
      <div class="qr-box" id="qrContainer"></div>
      <div class="qr-info">
        <div class="qi-title">📱 Boarding Pass QR</div>
        <div class="qi-desc">
          Present this QR at the check-in counter and boarding gate.<br>
          <strong style="color:#1A2A3A">${fromInfo.airport}${fT} → ${toInfo.airport}${tT}</strong>
        </div>
        <div class="qi-scan">✅ Scan to verify all flight details</div>
      </div>
    </div>

    <div class="pass-footer">
      <div class="reminder">
        <strong>⏰ Check-in:</strong> At least 2 hours before departure<br>
        <strong>🪪 Bring:</strong> Valid government-issued ID<br>
        <strong>📞 Support:</strong> skyease.airline@gmail.com
      </div>
      <button class="print-btn" onclick="window.print()">🖨️ Print Pass</button>
    </div>
  `;

  const qrData = [
    "SkyEase Boarding Pass",
    `Flight: ${airline} · ${booking}`,
    `Route: ${fromInfo.name} (${fromInfo.code}) → ${toInfo.name} (${toInfo.code})`,
    `Date: ${date} | Dep: ${time} | Arr: ${arrival}`,
    `Class: ${cls.toUpperCase()} | ${passengers.length} Passenger(s)`,
    `Passengers: ${paxNames}`,
    `Cabin: ${baggagePerPax.cabin} per pax`,
    `From: ${fromInfo.airport}${fT}`,
    `To: ${toInfo.airport}${tT}`,
  ].join('\n');

  new QRCode(document.getElementById('qrContainer'),{
    text:qrData, width:106, height:106,
    colorDark:'#1565C0', colorLight:'#FFFFFF', correctLevel:QRCode.CorrectLevel.M
  });
}

async function fetchFromBackend(bookingParam) {
  const BACKEND_URL = 'http://localhost:3000';
  const bookingNumber = bookingParam.replace(/-P\d+$/,'');
  try {
    const res  = await fetch(`${BACKEND_URL}/api/bookings/${bookingNumber}`);
    const data = await res.json();
    if (!data.success||!data.booking){ showError('Booking not found.','This QR code may be invalid or expired.'); return; }
    const b=data.booking, f=b.flightDetails;
    const passengers = b.passengers.map(pax=>({
      name:[pax.firstName,pax.middleName||'',pax.lastName].filter(Boolean).join(' '),
      gender:pax.gender, dob:pax.dateOfBirth||pax.dob||'N/A',
      meal:pax.mealPreference||'Standard', seat:pax.seat||'N/A',
    }));
    renderPass({
      booking:bookingParam, fromInfo:resolveAirport(f.from), toInfo:resolveAirport(f.to),
      date:f.date, time:f.time, arrival:f.arrival||'N/A',
      cls:f.seatClass||'economy', airline:f.airline,
      passengers, baggagePerPax:getBaggage(f.seatClass),
    });
  } catch(err){ showError('Cannot connect to server.','Please make sure the backend is running.'); }
}

function showError(title,desc){
  document.getElementById('boardingPass').innerHTML=`
    <div class="error-state"><div class="err-icon">✈️</div><h2>${title}</h2><p>${desc}</p></div>`;
}

loadBoardingPass();
</script>
</body>
</html>
